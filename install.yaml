name: unlighthouse

project_files:
- docker-compose.unlighthouse.yaml
- unlighthouseBuild
- unlighthouse
- commands

post_install_actions:
 - test -d ${DDEV_APPROOT}/reports/unlighthouse || mkdir -p ${DDEV_APPROOT}/reports/unlighthouse
 - test -f ${DDEV_APPROOT}/reports/unlighthouse/.gitkeep || touch ${DDEV_APPROOT}/reports/unlighthouse/.gitkeep
 - test -d ${DDEV_APPROOT}/tests/unlighthouse/local || mkdir -p ${DDEV_APPROOT}/tests/unlighthouse/local
 - test "$(ls -A ${DDEV_APPROOT}/tests/unlighthouse/local 2>/dev/null)" || cp unlighthouse/unlighthouse.ts ${DDEV_APPROOT}/tests/unlighthouse/local/unlighthouse.ts
 - echo "Install finished. Please restart ddev with 'ddev restart'"
 - echo "Please adjust tests in ${DDEV_APPROOT}/tests/unlighthouse/local/unlighthouse.ts"
 - echo "If you need to set a custom version, add UNLIGHTHOUSE_VERSION=<version>-base<base> in .ddev/.env (e.g. UNLIGHTHOUSE_VERSION=0.17.2-base1.0.0)"
